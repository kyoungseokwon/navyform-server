<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>사복택배 주소/BAND/월급계좌</title><style>
:root{--navy:#030b34;--blue:#142c66;--bg:#161719;--card:#202123;--line:#4b5162;--text:#eef6ff;--muted:#aab4c5;--danger:#ff7373}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#101113,#1a1b1e);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:520px;margin:0 auto;padding:0 18px 40px}.hero{margin:0 -18px 24px;padding:30px 22px 26px;border-radius:0 0 28px 28px;background:linear-gradient(135deg,#02072c,#02061d);display:flex;gap:16px;align-items:center}.logo{width:72px;height:72px;border-radius:18px;object-fit:cover;background:#111;border:1px solid #333}.hero h1{font-size:28px;margin:0 0 6px;line-height:1.15}.hero p,.desc{margin:0;color:var(--muted);font-size:17px}.step{display:flex;justify-content:center;gap:28px;align-items:center;margin:14px 0 22px}.circle{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);font-weight:800}.on{background:#06135a;border-color:#2440a0}.bar{width:90px;height:4px;background:#222c44}.card{border:1px solid var(--line);background:var(--card);border-radius:22px;padding:26px 22px;margin-bottom:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}h2{font-size:38px;line-height:1.15;margin:0 0 18px}.notice{font-size:20px;font-weight:800;margin:16px 0 28px}.field{margin:0 0 24px}label{font-size:20px;font-weight:800;display:block;margin-bottom:10px}.req{color:var(--danger)}input,select{width:100%;height:60px;border-radius:12px;border:1px solid #586072;background:#292a2c;color:var(--text);font-size:20px;padding:0 18px}select{appearance:auto}.ex{color:var(--muted);font-size:19px;margin-top:10px}.check{display:flex;gap:10px;align-items:center;font-size:19px;font-weight:700;margin:10px 0 22px}.check input{width:26px;height:26px}.btn{width:100%;height:62px;border:0;border-radius:12px;background:#08205c;color:white;font-weight:900;font-size:21px}.btn.secondary{background:transparent;border:1px solid var(--line)}.btn.danger{background:#a50909}.hidden{display:none}.ok{text-align:center;padding:45px 22px}.okmark{font-size:64px;margin-bottom:12px}.adminTop{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}.stat{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat div{border:1px solid var(--line);border-radius:16px;padding:18px}.big{font-size:34px;font-weight:900}.searchrow{display:grid;grid-template-columns:1fr 94px;gap:10px;margin:18px 0}.item{border:1px solid var(--line);border-radius:16px;padding:18px;margin:12px 0}.item h3{font-size:24px;margin:0 0 12px}.item p{font-size:17px;line-height:1.55;margin:0;color:#dce8fb}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.small{font-size:15px;color:var(--muted)}@media(min-width:700px){.wrap{max-width:760px}}
</style></head><body><main class="wrap"><header class="hero"><img class="logo" src="logo.png" alt="해군 마크"><div><h1>사복택배 주소/BAND/월급계좌</h1><p id="subtitle">입영 전 정보 입력</p></div></header>
<section id="formPage"><div class="step"><div><div class="circle on">1</div><b>정보 입력</b></div><div class="bar"></div><div><div class="circle">2</div><b class="small">제출 완료</b></div></div><div class="card"><h2>입영 전<br>정보 입력</h2><p class="desc">입영 전 필요한 정보를 입력해주세요.</p><p class="notice">※ 모든 항목은 필수입니다.</p><form id="form"><div class="field"><label>소대번호 <span class="req">*</span></label><input name="platoon" placeholder="소대번호를 입력하세요"><div class="ex">ex) 10101</div></div><div class="field"><label>이름 <span class="req">*</span></label><input name="name" placeholder="이름을 입력하세요"><div class="ex">ex) 홍길동</div></div><div class="field"><label>사복택배 주소 <span class="req">*</span></label><input name="address" placeholder="주소를 입력하세요"><div class="ex">ex) 본인 집 주소</div></div><div class="field"><label>BAND 전화번호 <span class="req">*</span></label><input name="bandPhone" placeholder="전화번호를 입력하세요"><div class="ex">ex) 010-1234-5678</div></div><div class="field"><label>월급 받을 은행 <span class="req">*</span></label><select name="bank"><option value="">은행을 선택하세요</option><option>국민은행</option><option>신한은행</option><option>우리은행</option><option>하나은행</option><option>농협은행</option><option>기업은행</option></select></div><div class="field"><label>계좌번호 <span class="req">*</span></label><input name="account" placeholder="계좌번호를 입력하세요"></div><div class="field"><label>예금주 <span class="req">*</span></label><input name="holder" placeholder="예금주를 입력하세요"><div class="ex">ex) 홍길동</div></div><label class="check"><input type="checkbox" id="agree"> 개인정보 수집 및 이용에 동의합니다.</label><button class="btn">제출하기</button></form></div></section>
<section id="donePage" class="hidden"><div class="step"><div><div class="circle">1</div><b class="small">정보 입력</b></div><div class="bar"></div><div><div class="circle on">2</div><b>제출 완료</b></div></div><div class="card ok"><div class="okmark">✅</div><h2>제출이<br>완료되었습니다</h2><p id="doneText" class="desc"></p><button class="btn" onclick="showForm()">수정하기</button><br><br><button class="btn secondary" onclick="showAdmin()">관리자 화면</button></div></section>
<section id="adminPage" class="hidden"><div class="adminTop"><button class="btn secondary" onclick="showForm()">작성 화면</button><button class="btn" onclick="location.href='/api/export'">엑셀 다운로드</button></div><div class="card"><h2>관리자<br>제출 현황</h2><p class="desc">서버 DB에 저장된 제출 데이터를 확인합니다.</p><div class="stat"><div><b>총 제출</b><div class="big" id="total">0</div></div><div><b>제출 한도</b><div class="big" id="limit">2000</div></div></div><div class="searchrow"><input id="q" placeholder="소대번호 또는 이름 검색" oninput="render()"><button class="btn" onclick="document.getElementById('q').value='';render()">초기화</button></div><div id="list"></div></div></section></main><script>
let rows=[];const $=id=>document.getElementById(id);function page(id){['formPage','donePage','adminPage'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden');scrollTo(0,0)}function showForm(){page('formPage')}function showDone(msg){$('doneText').textContent=msg||'입력해 주셔서 감사합니다.';page('donePage')}async function showAdmin(){page('adminPage');await load()}document.getElementById('form').onsubmit=async e=>{e.preventDefault();if(!$('agree').checked){alert('개인정보 수집 및 이용에 동의해주세요.');return}const data=Object.fromEntries(new FormData(e.target).entries());try{const r=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok) throw new Error(j.message);showDone(j.message)}catch(err){alert(err.message||'제출 중 오류가 발생했습니다.')}};async function load(){const r=await fetch('/api/submissions');const j=await r.json();rows=j.rows;$('total').textContent=j.total;$('limit').textContent=j.limit;render()}function render(){const q=($('q')?.value||'').trim();const list=$('list');const filtered=rows.filter(r=>!q||r.platoon.includes(q)||r.name.includes(q));list.innerHTML=filtered.map(r=>`<div class="item"><h3>${r.platoon} / ${r.name}</h3><p>제출: ${r.createdAt}<br>최근 수정: ${r.updatedAt} · 수정 ${Math.max(0,r.submitCount-1)}회<br><br><b>주소</b> ${r.address}<br><b>BAND</b> ${r.bandPhone}<br><b>은행</b> ${r.bank}<br><b>계좌</b> ${r.account}<br><b>예금주</b> ${r.holder}</p><div class="actions"><button class="btn secondary" onclick="fill(${r.id})">수정</button><button class="btn danger" onclick="del(${r.id})">삭제</button></div></div>`).join('')||'<p class="desc">제출 데이터가 없습니다.</p>'}function fill(id){const r=rows.find(x=>x.id===id);showForm();for(const k of ['platoon','name','address','bandPhone','bank','account','holder']) document.querySelector(`[name=${k}]`).value=r[k];$('agree').checked=true}async function del(id){if(!confirm('삭제할까요?'))return;await fetch('/api/submissions/'+id,{method:'DELETE'});await load()}
</script></body></html>
